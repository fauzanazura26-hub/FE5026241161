<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Pertemuan 3</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f4f7f6;
        }

        .header-app {
            background-color: #3381c5;
            color: white;
            padding: 40px 20px;
            margin-bottom: 30px;
            border-radius: 20px 20px 20px 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header-app text-center">
            <h2>Layanan Pesan Antar Cepat</h2>
            <p>Pesan makanan, minuman, atau print tugas langsung ke tempatmu tanpa ribet.</p>

            <button type="button" class="btn btn-light btn-lg mt-3 font-weight-bold" data-toggle="modal"
                data-target="#order-modal">
                Buat Pesanan Baru
            </button>
            <h6 style="font-size: xx-small;"><br>Fauzan Azura 5026241161</h6>
        </div>
    </div>

    <div class="modal fade" id="order-modal">
        <div class="modal-dialog" role="document">
            <div class="modal-content">

                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title" id="order">Detail Pesanan</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                        <span aria-hidden="true">&times;</span>
                    </button>
                </div>

                <div class="modal-body">
                    <form id="orderForm">
                        <div class="form-group">
                            <label for="layanan">Pilih Layanan</label>
                            <select class="form-control" id="layanan">
                                <option value="Makanan">Pesan Makan</option>
                                <option value="Minuman">Pesan Minum</option>
                                <option value="Jasa Print">Jasa Print</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="lokasi">Lokasi Pengantaran</label>
                            <input type="text" class="form-control" id="lokasi"
                                placeholder="Contoh: Gedung 4, Ruang 4101" required>
                        </div>
                        <div class="form-group">
                            <label for="catatan">Catatan Tambahan</label>
                            <textarea class="form-control" id="catatan" rows="2"
                                placeholder="Detail pesanan."></textarea>
                        </div>
                    </form>
                </div>

                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-secondary" data-dismiss="modal">Batal</button>
                    <button type="button" class="btn btn-success" onclick="prosesPesanan()">Konfirmasi Pesanan</button>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js"></script>

    <script>
        function prosesPesanan() {
            const layanan = document.getElementById('layanan').value;
            const lokasi = document.getElementById('lokasi').value;

            if (lokasi.trim() !== "") {

                alert("Sip! Pesanan '" + layanan + "' akan segera diproses dan diantar ke " + lokasi + ".");

                $('#orderModal').modal('hide');

                document.getElementById('orderForm').reset();
            } else {
                alert("Jangan lupa isi lokasi pengantaranmu dulu ya!");
            }
        }
    </script>
</body>

</html>
